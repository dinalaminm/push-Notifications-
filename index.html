<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Panel - Push Notification</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background-color: #f0f2f5; }
        .card { background: white; padding: 40px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; max-width: 400px; width: 90%; }
        button { background-color: #4CAF50; color: white; border: none; padding: 12px 24px; font-size: 16px; border-radius: 8px; cursor: pointer; width: 100%; font-weight: bold; }
        button:disabled { background-color: #bdc3c7 !important; cursor: not-allowed; }
        #token-display { margin-top: 25px; padding: 15px; background: #f8f9fa; border-radius: 8px; font-size: 11px; color: #555; word-break: break-all; border: 1px dashed #ddd; display: none; }
    </style>
</head>
<body>

    <div class="card">
        <h2>User Panel</h2>
        <p>নোটিফিকেশন এনাবল করতে নিচের বাটনে ক্লিক করুন।</p>
        <button id="notify-btn" onclick="requestPermission()">Enable Notification</button>
        <div id="token-display"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.0.0/firebase-app.js";
        import { getMessaging, getToken } from "https://www.gstatic.com/firebasejs/9.0.0/firebase-messaging.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDJaQ-0QMHnOUSN8jTZ1eLo7-3fmXSEK9o",
            authDomain: "din-push-server.firebaseapp.com",
            projectId: "din-push-server",
            storageBucket: "din-push-server.firebasestorage.app",
            messagingSenderId: "469250442836",
            appId: "1:469250442836:web:7a0576e7263ad8179d4fc1"
        };

        const app = initializeApp(firebaseConfig);
        const messaging = getMessaging(app);

        // Service Worker ম্যানুয়ালি রেজিস্টার করা (এটিই সমস্যার সমাধান করবে)
        async function registerServiceWorker() {
            if ('serviceWorker' in navigator) {
                try {
                    // আপনার রিপোজিটরির নাম এখানে সঠিকভাবে দিতে হবে
                    const registration = await navigator.serviceWorker.register('/push-Notifications-/firebase-messaging-sw.js');
                    console.log('Service Worker registered with scope:', registration.scope);
                    return registration;
                } catch (err) {
                    console.error('Service Worker registration failed:', err);
                }
            }
        }

        window.requestPermission = async () => {
            const btn = document.getElementById('notify-btn');
            const tokenBox = document.getElementById('token-display');

            const permission = await Notification.requestPermission();
            if (permission === 'granted') {
                btn.innerText = "Processing...";
                btn.disabled = true;

                // প্রথমে সার্ভিস ওয়ার্কার রেজিস্টার করুন
                const registration = await registerServiceWorker();

                // এবার টোকেন নিন
                getToken(messaging, { 
                    vapidKey: 'BPIP1SuGiJkbOP3iYghgt6IFDD_l88svem5IYt5bH13CmXxJoMWzNDwZ4o73gvz8NH0CTj5EdBCmuK7YT-R41pw',
                    serviceWorkerRegistration: registration // এটি খুব গুরুত্বপূর্ণ
                })
                .then((currentToken) => {
                    if (currentToken) {
                        btn.innerText = "Enabled ✅";
                        tokenBox.style.display = "block";
                        tokenBox.innerHTML = "<strong>Your Device Token:</strong><br>" + currentToken;
                    }
                }).catch((err) => {
                    btn.innerText = "Enable Notification";
                    btn.disabled = false;
                    alert("Error: " + err.message);
                });
            } else {
                alert("Permission Denied!");
            }
        }
    </script>
</body>
</html>
